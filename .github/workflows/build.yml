name: build

on:
  push:
  workflow_dispatch:

defaults:
  run:
    working-directory: PlayerView

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install Gradle 2.14.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-2.14.1-bin.zip
          unzip -q gradle-2.14.1-bin.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-2.14.1/bin" >> "$GITHUB_PATH"

      - name: Setup workspace
        run: gradle setupDecompWorkspace --no-daemon --refresh-dependencies

      - name: Build mod jar
        run: gradle build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: PlayerView-mod-jar
          path: PlayerView/build/libs/*.jar
